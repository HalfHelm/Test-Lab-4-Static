<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messenger</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Register</h2>
<label for="reg-name">Name</label>
<input id="reg-name" type="text">

<label for="reg-email">Email</label>
<input id="reg-email" type="email">

<label for="reg-password">Password</label>
<input id="reg-password" type="password">

<label for="reg-group">Group ID</label>
<input id="reg-group" type="text">

<button id="register-btn">Register</button>

<h2>Login</h2>
<label for="login-user">Username or Email</label>
<input id="login-user" type="text">
<label for="login-password">Password</label>
<input id="login-password" type="password">
<button id="login-btn">Login</button>

<hr>

<div id="app">

  <div id="sidebar">
    <h3>Users</h3>
    <ul id="user-list"></ul>
  </div>

  <div id="chat">
    <div id="chat-messages"></div>

    <form id="chat-form">
      <label for="chat-input">Message</label>
      <input id="chat-input" type="text" placeholder="Message..." />
      <button type="submit">Send</button>
    </form>
  </div>

</div>

<script type="module" src="./dist/app.js"></script>

</body>
</html>
